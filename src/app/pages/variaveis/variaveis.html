<h1>Variáveis</h1>

<p>
  As variáveis permitem armazenar dados que podem ser utilizados e alterados durante a execução da aplicação.
</p>

<h3>Exemplo</h3>

<pre>
let nome = "Evaldina";
let idade = 25;
const pais = "Angola";
</pre>

<div class="card">
  <h3>Dica</h3>
  <p>
    Utilize <strong>const</strong> para valores fixos e
    <strong>let</strong> para valores que podem ser alterados.
  </p>
</div>
